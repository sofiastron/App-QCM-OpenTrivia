<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QCM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="content">
    <header>
      <h1>QCM</h1>
      <p class="sousTitre">Personnalisez le quiz, puis testez vos connaissances avec les questions proposées</p>
    </header>

    
    <section class="carte">
      
      <form id="formulaire">
        <label>Nombre de questions
          <input type="number" id="nombre" min="1" max="40" value="4" required>
        </label>

        <label>Catégorie
          <select id="categorie">
            <option value="">Toutes</option>
            <option value="9">Général</option>
            <option value="21">Sport</option>
            <option value="18">Informatique</option>
            <option value="17">Science & Nature</option>
            <option value="23">Histoire</option>
          </select>
        </label>

        <label>Difficulté
          <select id="difficulte">
            <option value="">Toutes</option>
            <option value="easy">Facile</option>
            <option value="medium">Moyen</option>
            <option value="hard">Difficile</option>
          </select>
        </label>

        <label>Type
          <select id="type">
            <option value="">Tous</option>
            <option value="boolean">Vrai / Faux</option>
            <option value="multiple">QCM</option>
            
          </select>
        </label>

        <div class="actions">
          <button type="submit" id="generer">Générer le quiz</button>

          <button type="button" id="clear">Réinitialiser</button>
        </div>
      </form>
    </section>

    
    <section id="contenuDeQuiz" class="cache">
      <h2>Quiz</h2>
      <div id="quiz"></div>
      <div class="actions">
        <button id="submit">Valider les réponses</button>
        <button id="restart">Recommencer</button>
      </div>
    </section>

   
    <section id="resultContainer" class="cache">
      <h2>Résultat</h2>
      <div id="result"></div>
      <button id="retour">Retour à la configuration</button>
    </section>

    <footer>
      <small>Projet utilisant <a href="https://opentdb.com" target="_blank" rel="noopener">Open Trivia DB</a></small>
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
